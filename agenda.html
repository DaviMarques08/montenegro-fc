<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Montenegro</title>
    <link href="agenda.css" rel="stylesheet">
</head>

<body>
    <section class="proximo-jogo">

        <div class="scoreboard">
            <div class="team">
                <img src="img/escudo.png" alt="Montenegro FC" class="team-shield">
                <p class="team-name">Montenegro FC</p>
            </div>

            <div class="match-info">
                <p class="match-datetime">04.04.2026 17:00</p>
                <div class="score-dash"></div>
            </div>

            <div class="team">
                <img src="img/CHURRAS.png" alt="Nome do Rival" class="team-shield">
                <p class="team-name">Churras e amigos</p>
            </div>
        </div>

        <div class="checkin-container">
            <h4>Confirmar Presença</h4>
            <div class="input-grupo">
                <input type="text" id="nome-jogador" placeholder="Digite nome sobrenome aqui">
                <button id="btn-participar">Participar</button>
            </div>
            <p id="mensagem-validacao"></p>
        </div>

        <div id="secao-pix" class="pix-escondido">
            <div class="pix-card">
                <h3>Pagamento via PIX</h3>
                <p>Valor: <strong>R$10,00</strong></p>
            </div>

            <div class="chave-pix">
                <span>Chave: 046.007.752-01</span>
                <p>Banco Nubank</p>
                <p>Nome: Davi Marques</p>
                <button onclick="copiarChave()">Copiar Chave</button>
            </div>

            <div class="upload-area">
                <p>Após pagar, clique abaixo para enviar o comprovante e confirmar sua presença</p>
                <button id="btn-enviar-comprovante">Enviar via wpp</button>
            </div>
        </div>

        <div class="lista-presenca">
            <ul id="lista-confirmados">
            </ul>
        </div>
    </section>

    <script src="agenda.js"></script>
</body>

</html>
