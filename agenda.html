<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Montenegro</title>
    <link href="agenda.css" rel="stylesheet">
</head>

<body>

    <div class="imagem-fundo">
        
    </div>

    <section class="proximo-jogo">

        <div class="scoreboard">
            <div class="team">
                <div class="escudo-placar">
                <img src="img/escudo.png" alt="Montenegro FC" class="team-shield">
                <span class="gols"></span>
                </div>
                <p class="team-name">Montenegro FC</p>
            </div>

            <div class="match-info">
              <p class="match-datetime">04.04.2026 17:00</p> 
                <div class="score-dash"></div>
            </div>

            <div class="team">
                <div class="escudo-placar">
                <span class="gols"></span>
                <img src="img/CHURRAS.png" alt="Nome do Rival" class="team-shield">
                </div>
                <p class="team-name">Churras e amigos</p>
            </div>
        </div>

        <div class="btn-div">
            <button onclick="loc()" class="botao">Localização</button>
        </div>
    </section>

    <script src="agenda.js"></script>
</body>

</html>
